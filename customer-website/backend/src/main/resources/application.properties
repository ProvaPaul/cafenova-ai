server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/smart_cafe_db?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── SQL Initialization (idempotent — runs on every startup) ───────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/website_schema.sql
spring.sql.init.continue-on-error=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=SmartCafe2026SecretKeyForJWTSigningMustBe256BitsLong!
app.jwt.expiration-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── AI Service ────────────────────────────────────────────────────────────────
ai.service.url=http://localhost:8000/api/v1

# ── App ───────────────────────────────────────────────────────────────────────
app.name=Smart Cafe
logging.level.root=WARN
logging.level.com.smartcafe.website=INFO
