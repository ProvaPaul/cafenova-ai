# ─── MySQL Connection ────────────────────────────────────────────────────────
# Change these values to match your MySQL installation.
# useSSL=false is fine for local development; enable in production.
db.url=jdbc:mysql://localhost:3307/smart_cafe_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
db.username=root
db.password=

# ─── HikariCP Connection Pool ────────────────────────────────────────────────
# max.size: maximum number of connections in the pool
db.pool.max.size=10
# min.idle: minimum number of idle connections kept alive
db.pool.min.idle=2
# connection.timeout: milliseconds to wait for a connection before throwing
db.pool.connection.timeout=30000
# idle.timeout: milliseconds a connection can sit idle before being evicted
db.pool.idle.timeout=600000
# max.lifetime: maximum lifetime of a connection in the pool (under server wait_timeout)
db.pool.max.lifetime=1800000
